{% extends "base.html" %}
{% block body %}

<h2 style="margin-top:30px;">{{ 'Edit Laptop' if item else 'Add New Laptop' }}</h2>

<form method="post" style="margin-top:20px;">

  <div class="form-grid">

    <div>
      <label>SKU</label>
      <input name="sku" value="{{ item.sku if item else '' }}" required>
    </div>

    <div>
      <label>Brand</label>
      <input name="brand" value="{{ item.brand if item else '' }}">
    </div>

    <div>
      <label>Model</label>
      <input name="model" value="{{ item.model if item else '' }}">
    </div>

    <div>
      <label>Serial Number</label>
      <input name="serial" value="{{ item.serial if item else '' }}">
    </div>

    <div>
      <label>CPU</label>
      <input name="cpu" value="{{ item.cpu if item else '' }}">
    </div>

    <div>
      <label>RAM (GB)</label>
      <input type="number" name="ram_gb" value="{{ item.ram_gb if item else '' }}">
    </div>

    <div>
      <label>Storage</label>
      <input name="storage" value="{{ item.storage if item else '' }}">
    </div>

    <div>
      <label>Initial Price ($)</label>
      <input type="number" step="0.01" name="initial_price" value="{{ item.initial_price if item else '' }}">
    </div>

    <div>
      <label>Selling Price ($)</label>
      <input type="number" step="0.01" name="selling_price" value="{{ item.selling_price if item else '' }}">
    </div>

    <div>
      <label>Location</label>
      <input name="location" value="{{ item.location if item else '' }}">
    </div>

    <div>
      <label>Status</label>
      <select name="status">
        <option value="in_stock">In Stock</option>
        <option value="sold">Sold</option>
        <option value="reserved">Reserved</option>
        <option value="out_for_repair">Out for Repair</option>
      </select>
    </div>

    <div class="full-width">
      <label>Notes</label>
      <textarea name="notes" rows="3">{{ item.notes if item else '' }}</textarea>
    </div>

  </div>

  <div style="margin-top:30px;">
    <button type="submit" class="button">Save</button>
    <a href="{{ url_for('index') }}" class="button secondary">Cancel</a>
  </div>

</form>

{% endblock %}
